name: CI/CD Pipeline (HTML/JS)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: 🔍 Lint HTML/JS/CSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install linters
        run: npm install -g htmlhint stylelint eslint
      - name: HTML Lint
        run: htmlhint '**/*.html' || true
      - name: Check for broken links
        run: |
          for f in $(find . -name '*.html' -not -path './node_modules/*'); do
            echo "Checking $f..."
            grep -oP 'href="[^"]*"' "$f" | head -20 || true
          done

  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
      - name: Check for exposed secrets
        run: |
          echo "Scanning for exposed secrets..."
          grep -rn 'password\s*=' . --include='*.html' --include='*.js' --include='*.css' | grep -v node_modules || echo "✅ No exposed secrets found"
          grep -rn 'api[_-]key\s*=' . --include='*.html' --include='*.js' --include='*.css' | grep -v node_modules || echo "✅ No API keys found"

  lighthouse:
    name: 🏮 Performance Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to temp server
        run: |
          npm install -g serve
          serve -l 8080 . &
          sleep 3
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  deploy-pages:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
