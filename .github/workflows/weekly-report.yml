name: Weekly Report

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate-report:
    name: 📊 Generate Weekly Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate activity report
        uses: actions/github-script@v7
        with:
          script: |
            const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

            // Get commits
            const commits = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              since: oneWeekAgo
            });

            // Get PRs
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              sort: 'updated',
              direction: 'desc',
              per_page: 100
            });
            const weekPrs = prs.data.filter(pr => new pr.created_at > oneWeekAgo);

            // Get issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              since: oneWeekAgo,
              per_page: 100
            });

            const openIssues = issues.data.filter(i => !i.pull_request && i.state === 'open');
            const closedIssues = issues.data.filter(i => !i.pull_request && i.state === 'closed');

            // Get contributors
            const contributors = await github.rest.repos.listContributors({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const report = `# 📊 Weekly Report — ${context.repo.repo}

> Generated: ${new Date().toISOString().split('T')[0]}

## Activity Summary

| Metric | Count |
|--------|-------|
| Commits | ${commits.data.length} |
| PRs Opened | ${weekPrs.filter(p => p.state === 'open').length} |
| PRs Merged | ${weekPrs.filter(p => p.merged_at).length} |
| Issues Opened | ${openIssues.length} |
| Issues Closed | ${closedIssues.length} |
| Contributors | ${contributors.data.length} |

## Recent Commits (Last 7 Days)

${commits.data.slice(0, 10).map(c => `- \`${c.sha.substring(0, 7)}\` ${c.commit.message.split('\n')[0]} — _${c.commit.author.name}_`).join('\n')}

## Open Issues Needing Attention

${openIssues.slice(0, 5).map(i => `- [#${i.number}](${i.html_url}) ${i.title} ${i.labels.map(l => '`' + l.name + '`').join(' ')}`).join('\n') || 'None! 🎉'}

## Recommendations

- ${commits.data.length < 3 ? '⚠️ Low commit activity this week. Consider setting development goals.' : '✅ Healthy commit activity.'}
- ${openIssues.length > 5 ? '⚠️ Many open issues. Prioritize triage.' : '✅ Issue backlog is manageable.'}
- ${weekPrs.filter(p => !p.merged_at && p.state === 'open').length > 0 ? '📋 Unmerged PRs need review.' : '✅ All PRs handled.'}
`;

            // Create issue with report
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Weekly Report — ${new Date().toISOString().split('T')[0]}`,
              body: report,
              labels: ['report', 'automated']
            });
